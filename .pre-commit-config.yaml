# Never modify vendored target code, large generated graph artifacts, or
# raw diff/log evidence (a diff's blank context line is a meaningful space).
exclude: '^(target_repo/|reports/graph/|reports/fix\.diff|reports/repro_.*\.txt)'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types: [python]
        pass_filenames: false
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]
        pass_filenames: false
      - id: check-file-lines
        name: check file line limit (<=150 logical)
        entry: uv run python scripts/check_file_lines.py
        language: system
        pass_filenames: false
        always_run: true
